<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <!-- from-primary: hsl(174 72% 26%) = #117A65 teal -->
      <stop offset="0%" stop-color="#0e7368"/>
      <!-- to-accent: hsl(28 95% 55%) = saffron orange -->
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>

  <!-- Rounded square background matching header logo -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#grad)"/>

  <!-- Lucide Ticket icon scaled into center (original viewBox 0 0 24 24, scaled to fit ~60px centered at 20,20) -->
  <g transform="translate(20, 20) scale(2.5)" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Ticket path from lucide-react -->
    <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
    <line x1="13" y1="5" x2="13" y2="7"/>
    <line x1="13" y1="11" x2="13" y2="13"/>
    <line x1="13" y1="17" x2="13" y2="19"/>
  </g>
</svg>
